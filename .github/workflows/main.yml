name: Build Tweak
on: [push, pull_request]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Theos
        run: |
          bash -c "<LaTex>$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=~/theos" >> $</LaTex>GITHUB_ENV
      - name: Build Tweak
        run: |
          make package FINALPACKAGE=1
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManusTweak-Dylib
          path: .theos/obj/debug/*.dylib
