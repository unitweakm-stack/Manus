name: Build Tweak
on: [push, pull_request]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # Agar papka bo'lsa, uni o'chirib tashlaymiz va qaytadan yuklaymiz
          sudo rm -rf /Users/runner/theos
          git clone --recursive https://github.com/theos/theos.git /Users/runner/theos
          
          # SDK-larni yuklash (faqat kerakli qismini)
          git clone https://github.com/theos/sdks.git /tmp/sdks
          cp -r /tmp/sdks/*.sdk /Users/runner/theos/sdks/
          rm -rf /tmp/sdks

      - name: Build Tweak
        run: |
          export THEOS=/Users/runner/theos
          make package FINALPACKAGE=1
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManusTweak-Dylib
          path: .theos/obj/main/*.dylib
