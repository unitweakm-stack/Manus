name: Build Tweak
on: [push, pull_request]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git /Users/runner/theos
          # SDK yuklab olish (Kompilyatsiya uchun zarur)
          git clone https://github.com/theos/sdks.git /Users/runner/theos/sdks

      - name: Build Tweak
        run: |
          export THEOS=/Users/runner/theos
          make package FINALPACKAGE=1
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManusTweak-Dylib
          path: .theos/obj/main/*.dylib
